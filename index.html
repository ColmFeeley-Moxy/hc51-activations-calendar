<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HC51 Activations Calendar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#f0911e;--orange-l:#f8b05f;--orange-pl:#fccc96;--orange-w:#fee7ce;
  --dark:#525252;--grey:#878787;--grey-l:#b2b2b2;--grey-pl:#dadada;--border:#e4e4e4;
  --green:#92cc5e;--green-m:#a3d377;--green-l:#b5d991;--green-pl:#c6e0aa;
  --blue:#6573ba;--blue-m:#818dc5;--blue-l:#9ea6d0;--blue-pl:#bac0db;
  --surface:#f8f8f8;--white:#ffffff;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  background:var(--surface);color:var(--dark);min-height:100vh;overflow-x:hidden}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--dark);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:200;box-shadow:0 1px 0 rgba(255,255,255,0.06)}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-name{font-size:13px;font-weight:600;color:#fff;letter-spacing:0.02em;
  display:flex;flex-direction:column;line-height:1.2}
.topbar-name .sub{font-size:10px;font-weight:400;color:var(--grey-l);letter-spacing:0.06em;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-property{font-size:12px;color:var(--grey-l);letter-spacing:0.02em}
.topbar-avatar{width:28px;height:28px;border-radius:50%;background:var(--orange);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:0.04em}

/* CALENDAR SHELL */
.cal-shell{margin-top:52px;display:flex;flex-direction:column;height:calc(100vh - 52px)}

/* MONTH NAV */
.month-nav{background:var(--white);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;align-items:center;gap:12px;height:50px;flex-shrink:0}
.nav-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);
  background:var(--white);cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all 0.12s;color:var(--dark)}
.nav-btn:hover{background:var(--surface);border-color:var(--grey-l)}
.nav-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.month-label{font-size:16px;font-weight:600;color:var(--dark);min-width:150px}
.year-strip{display:flex;gap:3px;margin-left:8px;overflow-x:auto}
.year-month{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;
  color:var(--grey);cursor:pointer;transition:all 0.1s;white-space:nowrap}
.year-month:hover{background:var(--surface);color:var(--dark)}
.year-month.active{background:var(--dark);color:#fff}

/* FILTER TABS */
.filter-bar{background:var(--white);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;align-items:center;gap:8px;height:44px;flex-shrink:0}
.filter-tab{padding:4px 13px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;
  display:flex;align-items:center;gap:5px;user-select:none}
.filter-tab.all{border-color:var(--grey-pl);color:var(--dark)}
.filter-tab.all.active,.filter-tab.all:hover{background:var(--dark);color:#fff;border-color:var(--dark)}
.filter-tab.mkt{border-color:var(--orange-pl);color:var(--dark)}
.filter-tab.mkt.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.filter-tab.mkt:not(.active):hover{background:var(--orange-w)}
.filter-tab.sus{border-color:var(--green-pl);color:var(--dark)}
.filter-tab.sus.active{background:var(--green);color:#fff;border-color:var(--green)}
.filter-tab.sus:not(.active):hover{background:var(--green-pl)}
.filter-tab.pc{border-color:var(--blue-pl);color:var(--dark)}
.filter-tab.pc.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.filter-tab.pc:not(.active):hover{background:var(--blue-pl)}
.tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tab-count{font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;
  background:rgba(0,0,0,0.08);margin-left:2px}
.filter-tab.active .tab-count{background:rgba(255,255,255,0.22)}

/* CALENDAR GRID */
.cal-wrap{flex:1;overflow-y:auto}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);
  border-left:1px solid var(--border);background:var(--border);gap:1px}
.dow-header{background:var(--white);padding:7px 10px;text-align:center;
  font-size:11px;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--grey);border-bottom:1px solid var(--border)}

/* DAY CELL */
.day-cell{background:var(--white);padding:7px 9px;min-height:104px;
  cursor:pointer;transition:background 0.1s;position:relative;
  display:flex;flex-direction:column;gap:3px}
.day-cell:hover{background:#fafafa}
.day-cell.outside{background:#fafafa;cursor:default}
.day-cell.outside .day-num{color:var(--grey-l)}
.day-cell.today .day-num{color:var(--orange);font-weight:700}
.day-cell.selected{outline:2px solid var(--orange);outline-offset:-2px;background:#fffdf8}
.day-cell.has-spark::after{content:'';position:absolute;top:5px;right:6px;
  width:6px;height:6px;border-radius:50%;background:var(--orange)}
.day-num{font-size:12px;font-weight:600;color:var(--dark);margin-bottom:3px;line-height:1}
.day-cell.has-mkt{border-top:2.5px solid var(--orange)}
.day-cell.has-sus{border-top:2.5px solid var(--green)}
.day-cell.has-pc{border-top:2.5px solid var(--blue)}
.day-cell.has-mkt.has-sus,.day-cell.has-mkt.has-pc,.day-cell.has-sus.has-pc,
.day-cell.has-mkt.has-sus.has-pc{border-top:2.5px solid var(--orange)}

/* PILL */
.pill{border-radius:3px;padding:2px 5px;font-size:10px;font-weight:600;
  display:flex;align-items:center;gap:3px;overflow:hidden;
  white-space:nowrap;text-overflow:ellipsis;max-width:100%;line-height:1.35}
.pill.mkt{background:var(--orange-w);color:var(--dark)}
.pill.sus{background:var(--green-pl);color:var(--dark)}
.pill.pc{background:var(--blue-pl);color:var(--dark)}
.pill-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pill.mkt .pill-dot{background:var(--orange)}
.pill.sus .pill-dot{background:var(--green)}
.pill.pc .pill-dot{background:var(--blue)}
.pill-overflow{font-size:10px;font-weight:600;color:var(--grey);padding:1px 0}

/* HOVER CARD */
.hover-card{position:fixed;z-index:300;background:var(--white);
  border:1px solid var(--border);border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,0.12);padding:13px 15px;
  min-width:220px;max-width:270px;pointer-events:none;
  opacity:0;transition:opacity 0.12s}
.hover-card.visible{opacity:1}
.hc-date{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--grey);margin-bottom:7px}
.hc-item{display:flex;align-items:flex-start;gap:6px;padding:4px 0;
  border-bottom:1px solid var(--surface)}
.hc-item:last-child{border-bottom:none}
.hc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.hc-dot.mkt{background:var(--orange)}
.hc-dot.sus{background:var(--green)}
.hc-dot.pc{background:var(--blue)}
.hc-title{font-size:12px;font-weight:600;color:var(--dark);line-height:1.3}
.hc-summary{font-size:11px;color:var(--grey);margin-top:2px;line-height:1.4}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(82,82,82,0.35);
  z-index:400;opacity:0;pointer-events:none;transition:opacity 0.2s}
.overlay.visible{opacity:1;pointer-events:all}

/* DRAWER */
.drawer{position:fixed;top:52px;right:0;bottom:0;width:400px;
  background:var(--white);z-index:500;
  box-shadow:-4px 0 24px rgba(0,0,0,0.09);
  transform:translateX(100%);transition:transform 0.2s cubic-bezier(0.22,1,0.36,1);
  display:flex;flex-direction:column;overflow:hidden}
.drawer.open{transform:translateX(0)}
.drawer-head{background:var(--dark);padding:18px 18px 14px;flex-shrink:0;position:relative}
.drawer-close{position:absolute;top:12px;right:12px;width:26px;height:26px;
  border-radius:4px;border:1px solid rgba(255,255,255,0.15);
  background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:all 0.12s}
.drawer-close:hover{background:rgba(255,255,255,0.1);color:#fff}
.drawer-date-label{font-size:10px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--grey-l);margin-bottom:3px}
.drawer-day-title{font-size:17px;font-weight:600;color:#fff;line-height:1.2;padding-right:32px}
.drawer-body{flex:1;overflow-y:auto}

/* INITIATIVE SECTION */
.init-section{border-bottom:1px solid var(--border)}
.init-header{padding:12px 18px;display:flex;align-items:center;gap:7px;cursor:pointer;
  transition:background 0.1s;user-select:none;flex-wrap:wrap}
.init-header:hover{background:var(--surface)}
.init-chevron{margin-left:auto;font-size:10px;color:var(--grey-l);transition:transform 0.15s;flex-shrink:0}
.init-section.expanded .init-chevron{transform:rotate(180deg)}
.init-body{display:none;padding:0 18px 16px}
.init-section.expanded .init-body{display:block}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;
  border-radius:20px;font-size:11px;font-weight:600}
.chip.mkt{background:var(--orange-w);color:var(--dark)}
.chip.sus{background:var(--green-pl);color:var(--dark)}
.chip.pc{background:var(--blue-pl);color:var(--dark)}
.chip-dot{width:6px;height:6px;border-radius:50%}
.chip.mkt .chip-dot{background:var(--orange)}
.chip.sus .chip-dot{background:var(--green)}
.chip.pc .chip-dot{background:var(--blue)}
.tier{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase}
.tier.spark{background:var(--orange-pl);color:var(--dark)}
.tier.glow{background:var(--orange-l);color:#fff}
.tier.flare{background:var(--orange);color:#fff}
.audience-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;
  border-radius:3px;font-size:10px;font-weight:600;background:#f0f0f0;color:var(--grey)}

/* DETAIL CONTENT */
.init-meta-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.detail-label{font-size:10px;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--grey);margin:10px 0 4px}
.detail-label:first-child{margin-top:0}
.detail-summary{font-size:13px;color:var(--dark);line-height:1.6;margin-bottom:3px}
.detail-body{font-size:12.5px;color:var(--grey);line-height:1.6}
.detail-body ul{padding-left:16px;margin-top:4px}
.detail-body ul li{margin-bottom:3px}
.goals-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.goal-tag{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--surface);
  color:var(--grey);font-weight:600}

/* ASSET CARDS */
.asset-card{display:flex;align-items:center;gap:9px;padding:9px 11px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;margin-top:5px}
.asset-type{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;letter-spacing:0.03em}
.asset-type.pdf{background:var(--orange-w);color:var(--orange)}
.asset-type.img{background:var(--green-pl);color:var(--green)}
.asset-type.ppt{background:var(--blue-pl);color:var(--blue)}
.asset-info{flex:1}
.asset-name{font-size:12px;font-weight:600;color:var(--dark)}
.asset-meta{font-size:10px;color:var(--grey-l);margin-top:1px}
.asset-dl{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);
  background:var(--white);display:flex;align-items:center;justify-content:center;
  cursor:pointer;text-decoration:none;color:var(--orange);font-size:13px;font-weight:700;
  transition:all 0.12s;flex-shrink:0}
.asset-dl:hover{background:var(--orange);color:#fff;border-color:var(--orange)}

/* PRIDE BANNER */
.pride-banner{background:linear-gradient(90deg,#e25c5c 0%,#f0911e 18%,#f5d547 35%,#92cc5e 52%,#6573ba 70%,#9b59b6 85%,#e25c5c 100%);
  height:4px;width:100%;border-radius:2px}
</style>
</head>

// ─── APP STATE ───
let currentYear=2026, currentMonth=4, activeFilter='all', activeDay=null, hoverTimer=null;
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_ABBR=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function eventsForDate(d){return EVENTS.filter(e=>e.date===d)}
function filterEvents(evts){
  if(activeFilter==='all') return evts;
  return evts.filter(e=>e.team===activeFilter);
}
function fmtDate(y,m,d){return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function daysInMonth(y,m){return new Date(y,m,0).getDate()}
function firstDowMon(y,m){const d=new Date(y,m-1,1).getDay();return d===0?6:d-1}
function teamLabel(t){return {mkt:'Marketing',sus:'Sustainability',pc:'People & Culture'}[t]||t}
function tierBadge(t){return t?`<span class="tier ${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`:''}
function audienceBadge(a){const i={guests:'👥 Guests',colleagues:'🏨 Colleagues',both:'🌐 Both'};return `<span class="audience-badge">${i[a]||a}</span>`}
function countForMonth(){
  const y=currentYear,m=currentMonth,days=daysInMonth(y,m);
  let all=0,mkt=0,sus=0,pc=0;
  for(let d=1;d<=days;d++){
    EVENTS.filter(e=>e.date===fmtDate(y,m,d)).forEach(e=>{all++;if(e.team==='mkt')mkt++;if(e.team==='sus')sus++;if(e.team==='pc')pc++;});
  }
  return {all,mkt,sus,pc};
}

function renderCalendar(){
  const y=currentYear,m=currentMonth;
  const grid=document.getElementById('cal-grid');
  const headers=Array.from(grid.querySelectorAll('.dow-header'));
  grid.innerHTML='';
  headers.forEach(h=>grid.appendChild(h.cloneNode(true)));

  const firstDow=firstDowMon(y,m);
  const totalDays=daysInMonth(y,m);
  const prevDays=daysInMonth(y,m-1<1?12:m-1);
  const today=new Date();

  for(let i=0;i<firstDow;i++){
    const c=document.createElement('div');c.className='day-cell outside';
    c.innerHTML=`<div class="day-num">${prevDays-firstDow+1+i}</div>`;grid.appendChild(c);
  }

  for(let d=1;d<=totalDays;d++){
    const ds=fmtDate(y,m,d);
    const allEvts=eventsForDate(ds);
    const evts=filterEvents(allEvts);
    const isToday=today.getFullYear()===y&&today.getMonth()===m-1&&today.getDate()===d;
    const c=document.createElement('div');
    c.className='day-cell'+(isToday?' today':'')+(activeDay===ds?' selected':'');
    const cats=[...new Set(allEvts.map(e=>e.team))];
    cats.forEach(cat=>c.classList.add('has-'+cat));
    if(allEvts.some(e=>e.tier==='spark')) c.classList.add('has-spark');
    let h=`<div class="day-num">${d}</div>`;
    const vis=evts.slice(0,3);const over=evts.length-vis.length;
    vis.forEach(e=>{const t=e.title.length>26?e.title.substring(0,26)+'…':e.title;h+=`<div class="pill ${e.team}"><span class="pill-dot"></span>${t}</div>`;});
    if(over>0) h+=`<div class="pill-overflow">+${over} more</div>`;
    c.innerHTML=h;
    if(evts.length>0){
      c.addEventListener('click',()=>openDrawer(ds));
      c.addEventListener('mouseenter',ev=>scheduleHover(ev,ds));
      c.addEventListener('mouseleave',cancelHover);
    }
    grid.appendChild(c);
  }

  const total=firstDow+totalDays;
  const rem=total%7===0?0:7-(total%7);
  for(let i=1;i<=rem;i++){
    const c=document.createElement('div');c.className='day-cell outside';
    c.innerHTML=`<div class="day-num">${i}</div>`;grid.appendChild(c);
  }

  document.getElementById('month-label').textContent=`${MONTHS[m-1]} ${y}`;
  document.getElementById('topbar-property').textContent=`${MONTHS[m-1]} ${y}`;
  const cnt=countForMonth();
  ['all','mkt','sus','pc'].forEach(k=>{document.getElementById('cnt-'+k).textContent=cnt[k];});
  renderYearStrip();
}

function renderYearStrip(){
  const strip=document.getElementById('year-strip');strip.innerHTML='';
  [-2,-1,0,1,2,3].forEach(offset=>{
    let mo=currentMonth+offset,yr=currentYear;
    if(mo<1){mo+=12;yr--;} if(mo>12){mo-=12;yr++;}
    const el=document.createElement('span');
    el.className='year-month'+(mo===currentMonth&&yr===currentYear?' active':'');
    el.textContent=MONTH_ABBR[mo-1]+(yr!==currentYear?' '+yr:'');
    el.onclick=()=>{currentMonth=mo;currentYear=yr;renderCalendar();};
    strip.appendChild(el);
  });
}

function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth<1){currentMonth=12;currentYear--;} if(currentMonth>12){currentMonth=1;currentYear++;}
  closeDrawer();renderCalendar();
}

function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.filter-tab').forEach(t=>{t.classList.remove('active');if(t.classList.contains(f))t.classList.add('active');});
  renderCalendar();
}

function scheduleHover(ev,ds){cancelHover();hoverTimer=setTimeout(()=>showHover(ev.target,ds),280);}
function cancelHover(){clearTimeout(hoverTimer);document.getElementById('hover-card').classList.remove('visible');}
function showHover(el,ds){
  const evts=filterEvents(eventsForDate(ds));if(!evts.length)return;
  const d=new Date(ds+'T12:00:00');
  const hc=document.getElementById('hover-card');
  let html=`<div class="hc-date">${d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>`;
  evts.slice(0,4).forEach(e=>{html+=`<div class="hc-item"><span class="hc-dot ${e.team}"></span><div><div class="hc-title">${e.title}</div><div class="hc-summary">${e.summary.substring(0,70)}…</div></div></div>`;});
  hc.innerHTML=html;hc.classList.add('visible');
  const rect=el.closest('.day-cell')?.getBoundingClientRect()||el.getBoundingClientRect();
  const hcW=260,hcH=180;
  let left=rect.right+8,top=rect.top;
  if(left+hcW>window.innerWidth-8) left=rect.left-hcW-8;
  if(top+hcH>window.innerHeight-8) top=window.innerHeight-hcH-8;
  hc.style.left=left+'px';hc.style.top=top+'px';
}

function openDrawer(ds){
  activeDay=ds;cancelHover();
  const evts=filterEvents(eventsForDate(ds));if(!evts.length)return;
  const d=new Date(ds+'T12:00:00');
  document.getElementById('d-date').textContent=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('d-title').textContent=evts.length===1?evts[0].title:d.toLocaleDateString('en-GB',{day:'numeric',month:'long'});
  let body='';
  if(ds.startsWith('2026-06')&&evts.some(e=>e.id==='pc-june-pride'))
    body+=`<div style="padding:10px 18px 0"><div class="pride-banner"></div></div>`;
  evts.forEach((e,i)=>{
    const assetHtml=e.assets&&e.assets.length?e.assets.map(a=>`<div class="asset-card"><div class="asset-type ${a.type}">${a.type.toUpperCase()}</div><div class="asset-info"><div class="asset-name">${a.name}</div><div class="asset-meta">${a.size}</div></div><a class="asset-dl" href="#" onclick="return false">↓</a></div>`).join(''):'';
    const goalsHtml=e.goals&&e.goals.length?`<div class="detail-label">Goals</div><div class="goals-row">${e.goals.map(g=>`<span class="goal-tag">${g}</span>`).join('')}</div>`:'';
    body+=`<div class="init-section${i===0?' expanded':''}">
      <div class="init-header" onclick="this.closest('.init-section').classList.toggle('expanded')">
        <span class="chip ${e.team}"><span class="chip-dot"></span>${teamLabel(e.team)}</span>
        ${tierBadge(e.tier)}${audienceBadge(e.audience)}
        <span class="init-chevron">▼</span>
      </div>
      <div class="init-body">
        <div class="init-meta-row"></div>
        <div class="detail-label">What to do</div>
        <div class="detail-summary">${e.summary}</div>
        <div class="detail-body">${e.body}</div>
        ${goalsHtml}
        ${assetHtml?`<div class="detail-label">Assets &amp; Downloads</div>${assetHtml}`:''}</div></div>`;
  });
  document.getElementById('d-body').innerHTML=body;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
  renderCalendar();
}

function closeDrawer(){
  activeDay=null;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  renderCalendar();
}

renderCalendar();
</script>
</body>
</html>
